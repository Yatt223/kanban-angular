<div class="flex flex-col gap-3 bg-white/60 backdrop-blur-sm rounded-2xl p-4 min-h-[500px] w-80 shadow-lg border border-white">
  
  <!-- Header colonne -->
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-lg font-bold text-gray-800">
      {{ column().title }}
    </h2>
    <span class="text-xs font-semibold px-2 py-1 rounded-full bg-gray-100 text-gray-500">
      {{ column().tasks.length }}
    </span>
  </div>

  <!-- Zone des cards (vide pour l'instant) -->
  <div class="flex flex-col gap-2 flex-1">
    @for (task of column().tasks; track task.id) {
      <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 text-sm text-gray-700">
        {{ task.title }}
      </div>
    }
  </div>

</div>
