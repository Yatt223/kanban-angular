<div class="flex flex-col gap-3 bg-white/60 backdrop-blur-sm rounded-2xl p-4 min-h-[500px] w-80 shadow-lg border border-white">

  <!-- Header colonne -->
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-lg font-bold text-gray-800">
      {{ column().title }}
    </h2>
    <span class="text-xs font-semibold px-2 py-1 rounded-full bg-gray-100 text-gray-500">
      {{ column().tasks.length }}
    </span>
  </div>

  <!-- Drop zone -->
  <div
    cdkDropList
    [cdkDropListData]="column().id"
    [cdkDropListConnectedTo]="['todo', 'in-progress', 'done']"
    (cdkDropListDropped)="onDrop($event)"
    class="flex flex-col gap-2 flex-1"
  >
    @for (task of column().tasks; track task.id) {
      <div cdkDrag [cdkDragData]="task.id">
        <app-card
          [task]="task"
          (onDelete)="deleteTask($event)"
        />
        <!-- Preview fantôme pendant le drag -->
        <div *cdkDragPlaceholder class="bg-indigo-100 border-2 border-dashed border-indigo-300 rounded-xl h-16"></div>
      </div>
    }

    <!-- Empty state -->
    @if (column().tasks.length === 0) {
      <div class="flex-1 flex items-center justify-center border-2 border-dashed border-gray-200 rounded-xl min-h-24">
        <p class="text-sm text-gray-300">Déposez ici</p>
      </div>
    }
  </div>

</div>
