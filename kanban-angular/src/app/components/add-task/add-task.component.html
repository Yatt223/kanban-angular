@if (!isOpen) {
  <!-- Bouton ajouter -->
  <button
    (click)="open()"
    class="w-full flex items-center gap-2 text-sm text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 transition-all duration-200 rounded-xl px-3 py-2 border-2 border-dashed border-gray-200 hover:border-indigo-300"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    Ajouter une tâche
  </button>
} @else {
  <!-- Formulaire -->
  <div class="bg-white rounded-xl p-3 shadow-md border border-indigo-100 flex flex-col gap-2">
    <textarea
      [(ngModel)]="title"
      (keydown.enter)="submit()"
      (keydown.escape)="cancel()"
      placeholder="Titre de la tâche..."
      rows="2"
      autofocus
      class="w-full text-sm text-gray-700 placeholder-gray-300 resize-none outline-none"
    ></textarea>

    <div class="flex gap-2 justify-end">
      <button
        (click)="cancel()"
        class="text-xs text-gray-400 hover:text-gray-600 px-3 py-1 rounded-lg hover:bg-gray-100 transition-all"
      >
        Annuler
      </button>
      <button
        (click)="submit()"
        class="text-xs text-white bg-indigo-500 hover:bg-indigo-600 px-3 py-1 rounded-lg transition-all font-medium"
      >
        Ajouter
      </button>
    </div>
  </div>
}
