<div class="group bg-white rounded-xl p-4 shadow-sm border border-gray-100 hover:shadow-md hover:border-indigo-200 transition-all duration-200 cursor-grab active:cursor-grabbing">
  
  <!-- Header card -->
  <div class="flex items-start justify-between gap-2">
    <p class="text-sm font-medium text-gray-800 leading-snug flex-1">
      {{ task().title }}
    </p>

    <!-- Bouton supprimer -->
    <button
      (click)="delete()"
      class="opacity-0 group-hover:opacity-100 transition-opacity text-gray-300 hover:text-red-400 shrink-0"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Description (optionnelle) -->
  @if (task().description) {
    <p class="text-xs text-gray-400 mt-2 leading-relaxed">
      {{ task().description }}
    </p>
  }

  <!-- Footer card -->
  <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-50">
    <span class="text-[10px] text-gray-300">
      {{ task().createdAt | date:'dd MMM' }}
    </span>
    <span class="w-2 h-2 rounded-full"
      [class]="task().status === 'todo' ? 'bg-indigo-400' :
               task().status === 'in-progress' ? 'bg-amber-400' : 'bg-emerald-400'">
    </span>
  </div>

</div>
